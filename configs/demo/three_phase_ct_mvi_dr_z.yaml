project_name: "smurf-mainline"
experiment_name: "three_phase_ct_mvi_dr_z"
seed: 42
device: "auto"

data:
  dataset_type: "three_phase_ct_tabular"
  csv_path: ".private/demo/dr_z_mvi_cases.csv"
  target_column: "mvi_binary"
  patient_id_column: "case_id"
  phase_dir_columns:
    arterial: "arterial_series_dir"
    portal: "portal_series_dir"
    noncontrast: "noncontrast_series_dir"
  clinical_feature_columns:
    - age
    - sex
    - bmi
    - tumor_count
    - max_tumor_diameter
    - capsule_status
    - cirrhosis_flag
    - child_stage
    - afp
    - albumin
    - total_bilirubin
    - alt
    - ast
    - ggt
    - plt
    - inr
    - glucose
  target_shape: [16, 64, 64]
  window_preset: "liver"
  batch_size: 1
  num_workers: 0
  pin_memory: false
  train_ratio: 0.5
  val_ratio: 0.25
  test_ratio: 0.25
  clinical_preprocessing:
    normalize: true
    strategy: "zero_with_mask"

model:
  model_type: "three_phase_ct_fusion"
  num_classes: 2
  phase_feature_dim: 32
  share_phase_encoder: false
  phase_fusion_type: "gated"
  doctor_interest:
    enabled: true
    hidden_channels: 8
    temperature: 6.0
  topk_focus:
    enabled: true
    k: 3
    patch_size: [4, 4, 4]
    projection_dim: 16
  phase_fusion:
    mode: "gated"
    hidden_dim: 24
  use_risk_head: true
  tabular:
    hidden_dims: [16]
    output_dim: 16
    dropout: 0.1
  fusion:
    fusion_type: "gated"
    hidden_dim: 24
    dropout: 0.1

training:
  num_epochs: 1
  mixed_precision: false
  use_progressive_training: false
  doctor_interest_loss:
    cam_align_weight: 0.05
    consistency_weight: 0.02
    sparse_weight: 0.01
    diverse_weight: 0.01
    body_prior_weight: 0.02
  optimizer:
    optimizer: "adam"
    learning_rate: 0.0005
    weight_decay: 0.0001
  scheduler:
    scheduler: "none"

logging:
  output_dir: "outputs/three_phase_ct_mvi_dr_z"

explainability:
  export_phase_importance: true
  export_case_explanations: true
  heatmap_ready: true
  export_doctor_interest_maps: true
  build_results_split: "test"
  min_global_importance_samples: 5
