project_name: "smurf-mainline"
experiment_name: "three_phase_ct_mvi_dr_z"
seed: 42
device: "auto"

data:
  dataset_type: "three_phase_ct_tabular"
  csv_path: ".private/demo/dr_z_mvi_cases.csv"
  target_column: "mvi_binary"
  patient_id_column: "case_id"
  phase_dir_columns:
    arterial: "arterial_series_dir"
    portal: "portal_series_dir"
    noncontrast: "noncontrast_series_dir"
  clinical_feature_columns:
    - age
    - sex
    - bmi
    - tumor_count
    - max_tumor_diameter
    - capsule_status
    - cirrhosis_flag
    - child_stage
    - afp
    - albumin
    - total_bilirubin
    - alt
    - ast
    - ggt
    - plt
    - inr
    - glucose
  target_shape: [16, 64, 64]
  window_preset: "liver"
  batch_size: 1
  num_workers: 0
  pin_memory: false
  train_ratio: 0.5
  val_ratio: 0.25
  test_ratio: 0.25

model:
  model_type: "three_phase_ct_fusion"
  num_classes: 2
  phase_feature_dim: 32
  share_phase_encoder: false
  phase_fusion_type: "concatenate"
  use_risk_head: true
  tabular:
    hidden_dims: [16]
    output_dim: 16
    dropout: 0.1
  fusion:
    fusion_type: "gated"
    hidden_dim: 24
    dropout: 0.1

training:
  num_epochs: 1
  mixed_precision: false
  use_progressive_training: false
  optimizer:
    optimizer: "adam"
    learning_rate: 0.0005
    weight_decay: 0.0001
  scheduler:
    scheduler: "none"

logging:
  output_dir: "outputs/three_phase_ct_mvi_dr_z"
