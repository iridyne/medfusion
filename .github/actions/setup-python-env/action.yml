name: "Setup Python Environment"
description: "Setup Python with uv and install MedFusion dependencies"
inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  extras:
    description: "Extra dependencies to install (e.g., dev, docs, web)"
    required: false
    default: "dev"
  cache:
    description: "Enable pip cache"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache uv dependencies
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          ~/.cargo/bin/uv
        key: ${{ runner.os }}-uv-${{ inputs.python-version }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ inputs.python-version }}-
          ${{ runner.os }}-uv-

    - name: Install uv and setup environment
      shell: bash
      run: |
        set -euo pipefail

        if ! command -v uv &> /dev/null; then
          curl -LsSf https://astral.sh/uv/install.sh | sh
        fi

        export PATH="$HOME/.cargo/bin:$PATH"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

        uv venv

        extras_csv="${{ inputs.extras }}"
        sync_args=()
        IFS=',' read -ra extras_array <<< "$extras_csv"
        for extra in "${extras_array[@]}"; do
          extra="$(echo "$extra" | xargs)"
          if [[ -n "$extra" ]]; then
            sync_args+=(--extra "$extra")
          fi
        done

        uv sync "${sync_args[@]}"

        echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
        echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
