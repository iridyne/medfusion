name: Deploy VitePress site to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled deployment
        run: |
          echo "Automatic docs deployment is intentionally disabled."
          echo "Deploy docs manually when the docs app is ready."
