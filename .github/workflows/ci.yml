name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # Job 1: Testing
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          extras: "dev,web"

      - name: Generate mock data
        run: |
          uv run python scripts/generate_mock_data.py

      - name: Run tests
        run: |
          uv run pytest tests/ -v --cov=med_core --cov-report=xml --cov-report=term --ignore=tests/test_config_validation.py --ignore=tests/test_export.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Job 2: Integration Tests
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          extras: "dev,web"

      - name: Generate mock data
        run: |
          uv run python scripts/generate_mock_data.py

      - name: Run integration tests
        run: |
          uv run pytest tests/test_end_to_end.py -v --tb=short

      - name: Run smoke tests
        run: |
          bash test/smoke.sh

  # Job 3: Build Summary
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "Tests: ${{ needs.test.result }}"
          echo "Integration Tests: ${{ needs.integration-test.result }}"

      - name: Fail if any job failed
        if: |
          needs.test.result == 'failure' ||
          needs.integration-test.result == 'failure'
        run: exit 1
