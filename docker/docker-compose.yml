services:
  medfusion-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: medfusion/medfusion:0.4.0
    container_name: medfusion-web
    ports:
      - "8000:8000"
    environment:
      MEDFUSION_DATA_DIR: /app/data
      MEDFUSION_LOG_LEVEL: ${MEDFUSION_LOG_LEVEL:-INFO}
      MEDFUSION_DATABASE_URL: ${MEDFUSION_DATABASE_URL:-postgresql://medfusion:medfusion@postgres:5432/medfusion}
      MEDFUSION_REDIS_URL: ${MEDFUSION_REDIS_URL:-redis://redis:6379/0}
      MEDFUSION_TRAINING_QUEUE_BACKEND: ${MEDFUSION_TRAINING_QUEUE_BACKEND:-redis}
      MEDFUSION_REDIS_QUEUE_NAME: ${MEDFUSION_REDIS_QUEUE_NAME:-medfusion:training:jobs}
      MEDFUSION_AUTH_ENABLED: ${MEDFUSION_AUTH_ENABLED:-false}
      MEDFUSION_AUTH_USERNAME: ${MEDFUSION_AUTH_USERNAME:-admin}
      MEDFUSION_AUTH_PASSWORD: ${MEDFUSION_AUTH_PASSWORD:-}
      MEDFUSION_AUTH_TOKEN: ${MEDFUSION_AUTH_TOKEN:-}
      MEDFUSION_SECRET_KEY: ${MEDFUSION_SECRET_KEY:-change-this-in-production-please-use-32-plus-chars}
    volumes:
      - medfusion-data:/app/data
      - medfusion-outputs:/app/outputs
      - medfusion-checkpoints:/app/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: medfusion-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medfusion}
      POSTGRES_USER: ${POSTGRES_USER:-medfusion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medfusion}
    volumes:
      - medfusion-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medfusion} -d ${POSTGRES_DB:-medfusion}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: medfusion-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - medfusion-redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  medfusion-data:
    driver: local
  medfusion-outputs:
    driver: local
  medfusion-checkpoints:
    driver: local
  medfusion-postgres:
    driver: local
  medfusion-redis:
    driver: local

networks:
  default:
    name: medfusion-network
    driver: bridge
