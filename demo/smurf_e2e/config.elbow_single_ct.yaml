seed: 42
device: auto
output_dir: demo/smurf_e2e/outputs/elbow_single_ct

model:
  vision_backbone: mobilenetv3_small
  vision_feature_dim: 96
  pathology_feature_dim: 96
  tabular_feature_dim: 64
  pathology_encoder:
    type: patch_mil
    embedding_dim: 192
  fusion_strategy: fused_attention
  fusion_output_dim: 128
  fusion_num_heads: 4
  num_classes: 2

training:
  epochs: 1
  batch_size: 2
  num_workers: 0
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  survival_loss_weight: 0.0

data:
  csv_path: demo/smurf_e2e/data/elbow_dryrun/metadata.csv
  label_column: label
  split_column: split

  # 先用分类跑通；后续如果有可靠随访数据再打开
  enable_survival: false
  survival_time_column: survival_time
  survival_event_column: event

  # 单CT分支开关
  single_branch_mode: true
  ct_column: ct_paths

  tabular_numerical_columns: [age, bmi, crp]
  tabular_categorical_columns: [sex, smoking]

  # 这些字段在单CT模式下不会被使用，但保留以兼容旧流程
  region1_ct_column: region1_ct_paths
  region1_pathology_column: region1_pathology_paths
  region2_ct_column: region2_ct_paths
  region2_pathology_column: region2_pathology_paths

  hipt_embeddings_dir: demo/smurf_e2e/data/elbow_dryrun/hipt_embeddings
  max_instances_per_modality: 5
  image_size: 64

mock_data:
  num_samples: 96
  min_instances: 2
  max_instances: 6
  image_shape: [64, 64]
